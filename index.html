<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title x-data x-text="$store.app.dictionary?.titles?.app_title || 'Hardware Management'"></title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="./alpine.3.15.12.min.js"></script>
	<script src="./chart.4.5.1.js"></script>
	<style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen pb-1" x-data="hardwareApp()">

<div class="max-w-6xl mx-auto">
    
    <div id="loading-screen" x-show="currentScreen === 'loading'" class="flex flex-col items-center justify-center mt-32 space-y-4">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-slate-700"></div>
        <p class="text-gray-500 italic">Verifying session status...</p>
    </div>

	<div id="login-screen" x-show="currentScreen === 'login'" x-cloak class="max-w-md mx-auto mt-10 bg-white p-8 rounded-xl shadow-md border border-gray-100 text-center" x-data="{ showPassword: false }">
		<div class="mb-6">
			<div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-slate-100 text-slate-700 mb-3">
				<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
					<path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
				</svg>
			</div>
			<h2 class="text-2xl font-bold text-gray-900">Hardware management</h2>
		</div>
		
		<form @submit.prevent="loginWithCredentials()" class="space-y-4">
			<input type="text" 
				   name="username"
				   autocomplete="username"
				   x-model="loginForm.username" 
				   placeholder="Username..."
				   class="w-full px-4 py-3 border border-gray-200 rounded-lg text-center focus:outline-none focus:ring-2 focus:ring-slate-500">
			
			<div class="relative w-full">
				<input :type="showPassword ? 'text' : 'password'" 
					   name="password"
					   autocomplete="current-password"
					   x-model="loginForm.password" 
					   placeholder="Password..." 
					   class="w-full px-4 py-3 border border-gray-200 rounded-lg text-center focus:outline-none focus:ring-2 focus:ring-slate-500 pr-12">
				
				<button type="button" @click="showPassword = !showPassword" 
						class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-slate-600 focus:outline-none">
					<svg x-show="!showPassword" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
						<path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.644a11.042 11.042 0 0 1 12.796-8.654c.484.113.914.311 1.282.583a10.546 10.546 0 0 1 7.886 8.715a1.012 1.012 0 0 1 0-.644a11.042 11.042 0 0 1-12.796 8.654a10.548 10.548 0 0 1-9.172-9.342ZM12 15.75a3.75 3.75 0 1 0 0-7.5a3.75 3.75 0 0 0 0 7.5Z" />
					</svg>
					<svg x-show="showPassword" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5" x-cloak>
						<path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12c.345.966.88 1.859 1.577 2.645m4.017-4.017A3.75 3.75 0 0 1 9 15m3.75 3.036A10.479 10.479 0 0 1 12 21c-4.437 0-8.213-2.754-9.733-6.61a10.479 10.479 0 0 1 1.954-2.938m10.23 10.23L18.47 18.47M18 14.25A3.75 3.75 0 0 1 15 18m3-3.75a10.458 10.458 0 0 0 2.065-4.25a10.476 10.476 0 0 0-8.34-8.34a10.458 10.458 0 0 0-4.25 2.065M12 3a10.48 10.48 0 0 1 5.34 1.485M21 21L3 3" />
					</svg>
				</button>
			</div>

			<button type="submit" 
					class="w-full bg-slate-700 hover:bg-slate-800 text-white font-semibold py-3 px-4 rounded-lg transition duration-200 shadow-sm active:scale-[0.97] active:bg-slate-900 focus:outline-none">
				Login
			</button>
		</form>
	</div>

    <div id="error-msg" x-show="errorMessage" x-cloak class="max-w-6xl mx-auto mb-4 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg flex items-center justify-between shadow-sm">
        <span x-text="errorMessage"></span>
        <button @click="hideError()" class="text-red-400 hover:text-red-600 transition-colors focus:outline-none ml-3">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>
    </div>

    <div id="app-content" x-show="currentScreen === 'app'" x-cloak class="sm:space-y-4">
        
        <div class="bg-white p-3 shadow-sm border border-gray-100 flex items-center justify-between gap-4">
            <h1 class="text-xl sm:text-2xl font-bold text-gray-900 tracking-tight truncate" x-text="$store.app.dictionary?.titles?.app_title || 'Hardware Management'"></h1>
            <button @click="logout()" class="text-gray-600 hover:text-red-600 hover:bg-red-50 font-medium py-2 px-3 rounded transition duration-150 focus:outline-none whitespace-nowrap text-sm shrink-0">
                Sign Out
            </button>
        </div>

        <div id="summary-section" class="bg-white p-3 shadow-sm border border-gray-100" x-show="inventoryData && inventoryData.inventory">
            <div id="summary-content" class="space-y-3" x-show="inventoryData && inventoryData.summary">
                <div class="pb-3 border-b border-gray-100">
					<div class="grid grid-cols-3 sm:grid-cols-5 items-center gap-3 w-full">
						
						<div class="col-span-2 sm:col-span-2 flex items-baseline gap-1.5 flex-wrap">
							<span class="text-base sm:text-2xl text-slate-900 font-bold" x-text="formatAmount(globalTotals?.value)"></span>
							<div class="flex items-baseline text-sm sm:text-xl whitespace-nowrap" :class="globalTotals?.diff_value >= 0 ? 'text-emerald-600' : 'text-red-600'" >
								<span x-text="globalTotals?.diff_value > 0 ? '+' : ''"></span>
								<span x-text="formatAmount(globalTotals?.diff_value)"></span>
								<span class="pl-1" x-text="getPercentByValue(globalTotals?.diff_value, globalTotals?.base, true)"></span>
							</div>
						</div>

						<div class="col-span-1 sm:col-span-1 flex items-center justify-between sm:order-5 border-gray-100 justify-self-end">
							<button @click="handleManualRefresh()" 
									title="Trigger recalculation" 
									:disabled="isSyncing"
									class="group flex items-center gap-2 bg-gray-50 hover:bg-purple-50 active:scale-95 text-gray-600 hover:text-purple-700 font-medium text-xs py-2 px-3 rounded-lg border border-gray-200 hover:border-purple-200 shadow-sm transition duration-150 ease-in-out focus:outline-none shrink-0 disabled:opacity-60 disabled:cursor-not-allowed">
								
								<svg xmlns="http://www.w3.org/2000/svg" 
									 fill="none" 
									 viewBox="0 0 24 24" 
									 stroke-width="2.5" 
									 stroke="currentColor" 
									 class="w-3.5 h-3.5 text-gray-400 group-hover:text-purple-600 transition-colors" 
									 :class="isSyncing ? 'animate-spin text-purple-600' : ''">
									<path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" />
								</svg>

								<span x-show="isSyncing" class="font-semibold text-purple-600">Syncing...</span>
								<span x-show="!isSyncing" class="italic" x-cloak
									  x-text="inventoryData?.updated_at ? new Date(inventoryData.updated_at).toLocaleString(userLocale, { day: 'numeric', month: '2-digit', hour: '2-digit', minute: '2-digit' }) : '-'">
								</span>
							</button>						
						</div>

						<div class="col-span-2 sm:col-span-1 text-sm sm:text-xl text-gray-600 font-semibold">
							<span x-text="'Base ' + formatAmount(globalTotals?.base)"></span>
						</div>

						<div class="text-sm sm:text-xl text-right text-gray-600 font-semibold justify-self-end whitespace-nowrap">
							<span x-text="$store.app.dictionary?.fields?.maintenance_annual_rate || 'OH'">OH</span>
							<span x-text="formatAmount(globalTotals?.overhead)"></span>
						</div>
					</div>
				</div>
                <div class="pb-3 border-b border-gray-100" x-show="inventoryData?.summary?.by_type && Object.keys(inventoryData.summary.by_type).length > 0">
					<div class="flex items-center justify-between mb-2">
						<span class="text-xs font-bold uppercase tracking-wider">Montant par Type</span>
						<button @click="historyAxis = 'types'; showChart = true; fetchHistory();" 
								class="flex items-center justify-center gap-1.5 bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs font-semibold min-w-[3rem] py-2 px-3 rounded-lg border border-slate-300 transition duration-150 shadow-sm focus:outline-none"
								title="Afficher le graphique d'historique">
							<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
								<path stroke-linecap="round" stroke-linejoin="round" d="M3.75 3v16.5M21 19.5H3.75M6.75 12v4.5m4.5-6v6m4.5-9v9M21 7.5v12" />
							</svg>
						</button>
					</div>
                    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
                        <template x-for="[type, value] in Object.entries(inventoryData?.summary?.by_type || {})" :key="type">
                            <div class="p-3 bg-blue-50/50 rounded-lg border border-blue-100 flex flex-col justify-between">
                                <span class="text-xs font-semibold text-blue-700 uppercase" x-text="type"></span>
                                <div class="mt-0.5 flex items-baseline gap-1.5 flex-wrap">
                                    <span class="text-sm font-bold text-slate-800" x-text="formatAmount(value)"></span>
                                    <span class="text-xs font-medium text-slate-500" x-text="getPercentByValue(value, globalTotals?.value, true)"></span>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>

                <div class="bg-white space-y-4" x-show="inventoryData?.summary?.by_region_transparency && Object.keys(inventoryData.summary.by_region_transparency).length > 0">
                    <div class="pb-3 border-b border-gray-100 space-y-3">
						<div class="flex items-center justify-between pb-1.5">
                            <span class="text-xs font-bold uppercase tracking-wider">
                                Répartition Réelle
                            </span>
							<button @click="historyAxis = 'regions'; showChart = true; fetchHistory();" 
									class="flex items-center justify-center gap-1.5 bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs font-semibold min-w-[3rem] py-2 px-3 rounded-lg border border-slate-300 transition duration-150 shadow-sm focus:outline-none"
									title="Afficher le graphique d'historique">
								<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
									<path stroke-linecap="round" stroke-linejoin="round" d="M3.75 3v16.5M21 19.5H3.75M6.75 12v4.5m4.5-6v6m4.5-9v9M21 7.5v12" />
								</svg>
							</button>
                        </div>

						<div x-show="showChart" x-cloak class="border-b border-gray-100 pb-4">
							<div class="text-sm flex flex-wrap items-center justify-end gap-3 pb-4">
								
								<select 
									id="historyAxisSelect"
									x-model="historyAxis" 
									@change="fetchHistory()" 
									class="border border-gray-200 rounded-lg px-3 py-1.5 focus:outline-none focus:ring-2 focus:ring-slate-500 font-medium text-slate-700 bg-white"
								>
									<option value="regions">Par Régions</option>
									<option value="types">Par Types</option>
									<optgroup :label="$store.app.dictionary?.titles?.by_group || 'Par Groupe'">
										<option value="global">global</option>
										<template x-for="group in $store.app.dictionary?.groups" :key="group">
											<option :value="group" x-text="group"></option>
										</template>
									</optgroup>
								</select>

								<select id="historDaysSelect" x-model="historyDays" @change="fetchHistory()" 
									class="border border-gray-200 rounded-lg px-3 py-1.5 bg-white focus:outline-none focus:ring-2 focus:ring-slate-500 font-medium text-slate-700"
								>
									<option value="7">7 jours</option>
									<option value="30">30 jours</option>
									<option value="90">90 jours</option>
									<option value="365">365 jours</option>
								</select>

								<button @click="showChart = false" 
										title="Fermer le graphique"
										class="flex items-center justify-center bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 sm:px-8 py-2 rounded-lg border border-gray-200 hover:border-gray-300 transition duration-150 shadow-sm focus:outline-none">
									<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4 text-gray-500">
										<path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
									</svg>
								</button>

							</div>

							<!-- Zone Canvas -->
							<div class="bg-slate-50 border border-slate-200 relative w-full rounded-xl overflow-hidden" style="height: 280px;">
								<canvas id="hardwareHistoryChart"></canvas>
							</div>
						</div>

                        <div class="space-y-3">
                            <template x-for="[region, val] in Object.entries(inventoryData?.summary?.by_region_transparency || {})" :key="region">
                                <div class="space-y-1">
                                    <div class="flex justify-between text-sm">
                                        <span class="text-xs font-semibold text-blue-700 uppercase" x-text="region"></span>
										<div class="space-x-1.5 flex items-baseline">
											<span class="text-sm font-bold text-slate-800" x-text="formatAmount(val)"></span>
											<span class="text-xs font-medium text-slate-500 w-[50px] text-right" x-text="getPercentByValue(val, globalTotals?.value, true)"></span>
										</div>
                                    </div>
									<div class="w-full bg-gray-100 rounded-full h-2">
                                        <div class="bg-slate-700 h-2 rounded-full" :style="`width: ${(!globalTotals?.value || !val) ? 0 : ((Number(val) / Number(globalTotals?.value)) * 100).toFixed(2)}%`">
										</div>
                                    </div>

                                </div>
                            </template>
                        </div>
                    </div>
                    
                    <div x-show="inventoryData?.summary?.by_region && Object.keys(inventoryData.summary.by_region).length > 0">
                        <span class="text-xs font-bold uppercase tracking-wider block mb-2">
                            Vision brute
                        </span>
                        <div class="flex flex-wrap gap-1.5">
                            <template x-for="[region, val] in Object.entries(inventoryData?.summary?.by_region || {}).sort((a, b) => b[1] - a[1])" :key="region">
								<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-gray-50 text-gray-500 border border-gray-200"
									  x-text="region + ' : ' + getPercentByValue(val, globalTotals?.value)">
								</span>
                            </template>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <div id="inventory-section" x-show="inventoryStatus !== 'hidden'" class="bg-white shadow-sm border border-gray-200 overflow-hidden">
			
			<div id="create-hardware-block" x-show="showCreateBlock" x-cloak class="px-3 py-4 space-y-4 bg-gray-50 border border-gray-100">
				<h3 class="text-base font-bold text-gray-900" x-text="$store.app.dictionary?.titles?.register_new_hardware">Register New Hardware</h3>
				
				<div class="grid grid-cols-2 md:grid-cols-6 gap-3 items-end">
					
					<select x-model="addForm.group_id" 
							class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-slate-500">
						<option value="" disabled selected x-text="'* ' + ($store.app.dictionary?.fields?.group_id || 'Group')"></option>
						<template x-for="group in $store.app.dictionary?.groups" :key="group">
							<option :value="group" x-text="group"></option>
						</template>
					</select>

					<select x-model="addForm.type" 
							class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-slate-500">
						<option value="" disabled selected x-text="'* ' + ($store.app.dictionary?.fields?.type || 'Type')"></option>
						<template x-for="cat in $store.app.dictionary?.categories" :key="cat">
							<option :value="cat" x-text="cat"></option>
						</template>
					</select>

					<input type="text" x-model="addForm.model_name" :placeholder="'* ' + $store.app.dictionary?.fields?.model_name" 
						   class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-500">

					<input type="number" step="0.1" x-model="addForm.unit_count" :placeholder="'* ' + $store.app.dictionary?.fields?.unit_count" 
						   class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-500">

					<div class="flex gap-3 w-full col-span-2">
						<input type="number" step="0.01" x-model="addForm.base_cost" :placeholder="$store.app.dictionary?.fields?.base_cost" :disabled="isSecuredType(addForm.type)" 
							   class="w-1/2 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-500 disabled:bg-gray-100 disabled:text-gray-400 disabled:opacity-60">
						
						<select x-model="addForm.base_unit"
								class="w-1/2 border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-slate-500 disabled:bg-gray-100 disabled:text-gray-400 disabled:opacity-60">
							<option value="" disabled selected x-text="'* ' + ($store.app.dictionary?.fields?.base_unit || 'Base unit')"></option>
							<template x-for="unit in $store.app.dictionary?.allowed_base_units" :key="unit">
								<option :value="unit" x-text="unit"></option>
							</template>
						</select>
					</div>

					<input type="text" x-model="addForm.model_code" :placeholder="'* ' + $store.app.dictionary?.fields?.model_code" :disabled="isSecuredType(addForm.type)" 
						   class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-500 disabled:bg-gray-100 disabled:text-gray-400 disabled:opacity-60">

					<input type="text" x-model="addForm.alt_code" :placeholder="$store.app.dictionary?.fields?.alt_code" :disabled="isSecuredType(addForm.type)" 
						   class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-500 disabled:bg-gray-100 disabled:text-gray-400 disabled:opacity-60">

					<input type="text" x-model="addForm.serial_number" :placeholder="$store.app.dictionary?.fields?.serial_number" :disabled="isSecuredType(addForm.type)" 
						   class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-500 disabled:bg-gray-100 disabled:text-gray-400 disabled:opacity-60">

					<select x-model="addForm.region" :disabled="isSecuredType(addForm.type)" 
							class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-slate-500 disabled:bg-gray-100 disabled:text-gray-400 disabled:opacity-60">
						<option value="" disabled selected x-text="'* ' + ($store.app.dictionary?.fields?.region || 'Region')"></option>
						<template x-for="region in $store.app.dictionary?.regions" :key="region">
							<option :value="region" x-text="region"></option>
						</template>
					</select>

					<input type="number" step="0.01" x-model="addForm.maintenance_annual_rate" :placeholder="$store.app.dictionary?.fields?.maintenance_annual_rate" :disabled="isSecuredType(addForm.type)" 
						   class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-500 disabled:bg-gray-100 disabled:text-gray-400 disabled:opacity-60">

					<input type="text" x-model="addForm.uid" :placeholder="$store.app.dictionary?.fields?.uid" 
						   class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-500">

				</div>

				<div class="flex items-center justify-end gap-3 pt-2 w-full">
					<button @click="toggleCreateBlock()" 
								type="button"
								class="w-1/2 sm:w-auto bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium rounded-lg text-sm py-2 px-4 transition duration-200 text-center border border-gray-200 shadow-sm">
						Cancel
					</button>
					
					<button @click="submitHardware()" 
							class="w-1/2 sm:w-auto bg-slate-800 hover:bg-slate-900 text-white font-medium rounded-lg text-sm py-2 px-6 transition duration-200 shadow-sm text-center">
						Create
					</button>
				</div>
			</div>

			<div x-show="inventoryStatus === 'loaded'" class="p-3 flex flex-col gap-2.5">
				<div class="flex items-center justify-between w-full gap-2 sm:gap-4">
					<div class="flex items-center gap-2 sm:gap-3">
						<div class="inline-flex rounded-md shadow-sm shrink-0" role="group">
							<button type="button" x-text="$store.app.dictionary?.titles?.by_group || 'Par Groupe'"
									@click="displayMode = 'split'"
									:class="displayMode === 'split' ? 'bg-slate-700 text-white border-slate-700' : 'bg-white text-gray-700 border-gray-200 hover:bg-gray-50'"
									class="px-3 py-2 text-xs font-semibold rounded-l-lg border transition-colors focus:outline-none">
							</button>
							<button type="button" 
									@click="displayMode = 'global'"
									:class="displayMode === 'global' ? 'bg-slate-700 text-white border-slate-700' : 'bg-white text-gray-700 border-gray-200 hover:bg-gray-50'"
									class="px-3 py-2 text-xs font-semibold rounded-r-lg border-t border-b border-r transition-colors focus:outline-none">
								Global
							</button>
						</div>

						<button @click="downloadCSV()"

<!-- MODALE GLOBALE ET UNIQUE OPTIMISÉE (SANS DUPLICATION DE STRUCTURE ET DE BOUTONS) -->
<template x-teleport="body">
	<div x-show="showModal" 
		 class="fixed inset-0 z-[10000] flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm"
		 x-cloak
		 x-transition:enter="transition ease-out duration-200"
		 x-transition:enter-start="opacity-0"
		 x-transition:enter-end="opacity-100"
		 x-transition:leave="transition ease-in duration-150"
		 x-transition:leave-start="opacity-100"
		 x-transition:leave-end="opacity-0">

		<!-- Fenêtre de Dialogue unique -->
		<div @click.away="showModal = false" @keydown.stop
			 class="relative w-full max-w-lg transform overflow-hidden rounded-xl bg-white p-6 shadow-2xl transition-all border border-slate-100"
			 x-transition:enter="transition ease-out duration-300"
			 x-transition:enter-start="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
			 x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100"
			 x-transition:leave="transition ease-in duration-200"
			 x-transition:leave-start="opacity-100 translate-y-0 sm:scale-100"
			 x-transition:leave-end="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95">

			<!-- En-têtes dynamiques selon le type -->
			<div class="mb-4">
				<h3 x-show="modalType === 'edit' && activeItem" class="text-sm font-bold text-slate-800 normal-case tracking-normal">
					Mise à jour : <span class="text-slate-500 font-medium" x-text="activeItem?.model_name"></span>
				</h3>
				<h3 x-show="modalType === 'rename'" class="text-sm font-bold text-slate-800">
					Renommer
				</h3>
				<h3 x-show="modalType === 'purge'" class="text-sm font-bold text-center text-slate-800 mb-1">
					Supprimer cet élément ?
				</h3>
			</div>

			<!-- Corps de formulaire dynamique -->
			<div class="mb-5">
				<!-- Contenu ÉDITION -->
				<div x-show="modalType === 'edit' && activeItem" class="flex gap-2.5">
					<div class="w-1/2">
						<label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1" x-text="$store.app.dictionary?.fields?.unit_count || 'Unit Count'"></label>
						<input type="number" 
							   step="0.1"
							   x-model="tempUnitCount" 
							   class="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-slate-500 focus:border-slate-500 font-medium text-slate-800"
							   x-init="$nextTick(() => { if(modalType === 'edit') $el.focus(); })"
							   @keydown.enter.prevent.stop="editForm.unit_count = tempUnitCount; editForm.base_cost = tempBaseCost; saveQtyAndBaseCost(activeItem.uid); showModal = false">
					</div>
					
					<div class="w-1/2">
						<label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1" x-text="$store.app.dictionary?.fields?.base_cost || 'Base Cost'"></label>
						<input type="number" 
							   step="0.01"
							   x-model="tempBaseCost" 
							   class="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-slate-500 focus:border-slate-500 font-medium text-slate-800"
							   @keydown.enter.prevent.stop="editForm.unit_count = tempUnitCount; editForm.base_cost = tempBaseCost; saveQtyAndBaseCost(activeItem.uid); showModal = false">
					</div>
				</div>

				<!-- Contenu RENOMMER -->
				<div x-show="modalType === 'rename' && activeItem">
					<input type="text" 
						   x-model="tempName" 
						   @keyup.enter="if(tempName.trim()) { renameHardware(activeItem, tempName.trim()); showModal = false; }"
						   class="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-slate-500 focus:border-slate-500" 
						   placeholder="Nom du modèle"
						   x-init="$nextTick(() => { if(modalType === 'rename') $el.focus(); })">
				</div>

				<div x-show="modalType === 'allocate_resource' && activeItem" class="space-y-4">
					<div>
						<label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1"
							x-text="'Montant ' + $store.app.dictionary?.allocate_resource">
						</label>
						<input inputmode="numeric" pattern="-?[0-9]*" x-model="tempResourceDelta"
							   class="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-slate-500 font-medium text-slate-800">
						<p class="mt-2 text-xs text-slate-600 font-medium">
							Valeur actuelle : <span class="font-semibold" x-text="Number(activeItem?.unit_count || 0)"></span><br>
							Nouvelle valeur cible : <span class="font-bold text-blue-600" x-text="Number(activeItem?.unit_count || 0) + Number(tempResourceDelta || 0)"></span>
						</p>
					</div>
				</div>

				<!-- Contenu Supprimer -->
				<div x-show="modalType === 'purge' && activeItem" class="text-center">
					<p class="text-xs text-slate-800 break-all px-2" x-text="activeItem?.model_name || activeItem?.uid"></p>
				</div>
			</div>

			<!-- Pied de page et Boutons d'action unifiés -->
			<div class="flex items-center gap-2.5" :class="modalType === 'purge' ? 'justify-center' : 'justify-end'">
				<button @click="showModal = false" 
						class="px-4 py-2 text-xs font-semibold text-slate-600 bg-slate-50 hover:bg-slate-100 rounded-lg border border-slate-200 transition duration-150"
						:class="modalType === 'purge' ? 'flex-1' : ''">
					<span x-text="modalType === 'purge' ? 'Non, annuler' : 'Annuler'"></span>
				</button>
				
				<!-- Bouton validation dynamique -->
				<button x-show="modalType === 'edit'"
						@click="editForm.unit_count = tempUnitCount; editForm.base_cost = tempBaseCost; saveQtyAndBaseCost(activeItem.uid); showModal = false"
						class="px-4 py-2 text-xs font-semibold text-white bg-slate-800 hover:bg-slate-900 rounded-lg transition duration-150">
					Enregistrer
				</button>

				<button x-show="modalType === 'rename'"
						@click="renameHardware(activeItem, tempName.trim()); showModal = false"
						:disabled="!tempName.trim()"
						class="px-4 py-2 text-xs font-semibold text-white bg-slate-800 hover:bg-slate-900 rounded-lg transition duration-150 disabled:opacity-50">
					Enregistrer
				</button>

				<button x-show="modalType === 'allocate_resource'"
						@click="saveResourceAllocation(activeItem.uid); showModal = false"
						class="px-4 py-2 text-xs font-semibold text-white bg-slate-800 hover:bg-slate-900 rounded-lg transition duration-150">
					Confirmer
				</button>

				<button x-show="modalType === 'purge'"
						@click="purgeHardware(activeItem.uid); showModal = false" 
						class="flex-1 px-4 py-2 text-xs font-semibold text-white bg-red-600 hover:bg-red-700 rounded-lg transition duration-150">
					Oui, Supprimer
				</button>
			</div>

		</div>
	</div>
</template>

<script>
    const API_ROUTE = "https://vi1ch5yfp2.execute-api.eu-west-1.amazonaws.com/dev"; 
    
    document.addEventListener('alpine:init', () => {
        Alpine.store('app', {
            dictionary: null
        });
    });

    // Modèles d'état initiaux pour simplifier la réinitialisation et la copie
    const getInitialAddForm = () => ({
        uid: '', group_id: '', type: '', model_name: '', unit_count: '',
        base_cost: '', model_code: '', alt_code: '', serial_number: '',
        region: '', base_unit: '', maintenance_annual_rate: ''
    });

    function hardwareApp() {
        return {
            currentScreen: 'loading',
            userLocale: 'fr-FR',
            errorMessage: '',
            displayMode: 'split',
            showCreateBlock: false,
            isSyncing: false,
            inventoryData: null,
            inventoryStatus: 'hidden',
            inventoryGroups: [],
            expandedRows: [],
            activeMenuUid: null,
            showModal: false,
            modalType: '',
            filterQuery: '',
            historyAxis: 'regions',
            historyDays: '30',
            showChart: false,
            chartInstance: null,
            historyController: null,
            loginForm: { username: '', password: '' },
            addForm: getInitialAddForm(),
            activeItem: null,
            tempUnitCount: 0,
            tempBaseCost: 0,
			tempResourceDelta: 0,
            tempName: '',
            editForm: { unit_count: '', base_cost: '' },

            async init() {
                this.$watch('addForm.type', (value) => this.handleTypeChange(value));

                const savedUsername = sessionStorage.getItem('parc_username');
                const savedPassword = sessionStorage.getItem('parc_password');

                if (savedUsername && savedPassword) {
                    try {
                        const authorized = await this.loadDictionary();
                        if (authorized) { 
                            this.showApp(); 
                            return; 
                        }
                    } catch (err) {
                        console.error("Erreur d'initialisation :", err);
                    }
                }
                this.showLogin();
            },


            getSecureHeaders() {
                const username = sessionStorage.getItem('parc_username') || this.loginForm.username || '';
                const password = sessionStorage.getItem('parc_password') || this.loginForm.password || '';
                return {
                    'Content-Type': 'application/json',
                    'X-Poste-Config': username && password ? `${username}:${password}` : ''
                };
            },

            async apiRequest(endpoint, options = {}) {
                const url = `${API_ROUTE}${endpoint}`;
                const mergedOptions = {
                    ...options,
                    headers: {
                        ...this.getSecureHeaders(),
                        ...(options.headers || {})
                    }
                };
                
                const response = await fetch(url, mergedOptions);
                
                if (response.status === 401 || response.status === 403) {
                    this.logout();
                    throw new Error("Session expirée ou non autorisée.");
                }
                
                return response;
            },

            async loadDictionary() {
                try {
                    const response = await this.apiRequest('/devices?action=config');
                    if (!response.ok) return false;
                    
                    const dict = await response.json();
                    Alpine.store('app', { dictionary: dict });
                    return true;
                } catch (err) { 
                    return false; 
                }
            },

            async loadInventoryData() {
                this.inventoryStatus = 'loading';
                this.inventoryData = null;
                this.inventoryGroups = [];

                try {
                    const response = await this.apiRequest('/devices?action=list');
                    const data = await response.json();

                    if (!response.ok) {
                        this.showError(data.message || `Erreur (${response.status})`);
                        this.inventoryStatus = 'hidden';
                        return;
                    }
                    
                    if (data.warning_message) {
                        this.showError(data.warning_message);
                    }

                    this.inventoryData = data;
                    if (!data.inventory || Object.keys(data.inventory).length === 0) {
                        this.inventoryStatus = 'empty';
                        return;
                    }

                    this.prepareInventoryGroups(data.inventory);
                    this.inventoryStatus = 'loaded';

                    if (this.showChart) {
                        this.fetchHistory();
                    }
                } catch (err) {
                    this.showError(err.message);
                    this.inventoryStatus = 'hidden';
                }
            },

            async saveQtyAndBaseCost(uid) {
                this.hideError();
                const unitCount = Number(this.editForm.unit_count);

                if (this.editForm.unit_count === '' || isNaN(unitCount) || unitCount < 0) {
                    this.showError("Quantité invalide.");
                    return;
                }

                const payload = { uid, unit_count: unitCount };
                const baseCost = Number(this.editForm.base_cost);
                if (this.editForm.base_cost !== "" && !isNaN(baseCost)) {
                    payload.base_cost = baseCost;
                }

                try {
                    const response = await this.apiRequest('/devices?action=update', {
                        method: 'POST',
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        const fault = await response.json();
                        throw new Error(fault.error || "Impossible d'enregistrer les modifications.");
                    }
                    this.loadInventoryData();
                } catch (err) {
                    this.showError(err.message);
                }
            },

            async submitHardware() {
                this.hideError();
                
                try {
                    const response = await this.apiRequest('/devices?action=create', {
                        method: 'POST',
                        body: JSON.stringify(this.addForm)
                    });

                    if (!response.ok) {
                        const fault = await response.json();
                        throw new Error(fault.error || "Erreur lors du déploiement.");
                    }

                    this.addForm = getInitialAddForm();
                    this.loadInventoryData();
                } catch (err) {
                    this.showError(err.message);
                }
            },

            async renameHardware(item, newName) {
                this.hideError();
                if (!newName || newName === item.model_name) return;

                try {
                    const response = await this.apiRequest('/devices?action=update', {
                        method: 'POST',
                        body: JSON.stringify({ uid: item.uid, model_name: newName })
                    });

                    if (!response.ok) {
                        const fault = await response.json();
                        throw new Error(fault.error || "Impossible de renommer l'équipement.");
                    }
                    this.loadInventoryData();
                } catch (err) {
                    this.showError(err.message);
                }
            },

			async saveResourceAllocation(uid) {
				if (isNaN(this.tempResourceDelta) || this.tempResourceDelta === 0) {
					alert("Veuillez saisir une valeur valide différente de 0.");
					return;
				}

				try {
                    const response = await this.apiRequest('/devices?action=allocate_resource', {
                        method: 'POST',
                        body: JSON.stringify({
							uid: uid,
							delta: this.tempResourceDelta
						})
                    });
					if (response.ok) {
						this.loadInventoryData(); 
						this.tempResourceDelta = ''; 
					} else {
						console.error("Erreur lors de l'allocation de la ressource");
					}
				} catch (error) {
					console.error("Erreur réseau :", error);
				}
			},


            async purgeHardware(targetUid) {
                this.hideError();

                try {
                    const response = await this.apiRequest('/devices?action=purge', {
                        method: 'POST',
                        body: JSON.stringify({ uid: targetUid })
                    });

                    if (!response.ok) {
                        const fault = await response.json();
                        throw new Error(fault.error || "Échec de la suppression.");
                    }

                    this.loadInventoryData();
                } catch (err) {
                    this.showError(err.message);
                }
            },

            async handleManualRefresh() {
                this.hideError();
                this.isSyncing = true;

                try {
                    const response = await this.apiRequest('/sync?action=refresh', { method: 'POST' });

                    if (!response.ok) {
                        const data = await response.json();
                        throw new Error(data.message || "Échec du recalcul.");
                    }
                    await this.loadInventoryData();     
                } catch (err) {
                    this.showError(`Erreur de recalcul : ${err.message}`);
                } finally {
                    this.isSyncing = false;
                }
            },

            async fetchHistory() {
                try {
                    const targetAxis = this.historyAxis || 'regions';
                    const targetDays = this.historyDays || '30';

                    // Interrompt la requête précédente si elle est encore active
                    if (this.historyController) {
                        this.historyController.abort();
                    }
                    
                    this.historyController = new AbortController();

                    if (this.chartInstance) {
                        this.chartInstance.destroy();
                        this.chartInstance = null;
                    }

                    let url = `/devices?action=history&axis=${targetAxis}&days=${targetDays}`;
                    if (targetAxis !== 'types' && targetAxis !== 'regions') {
                        url = `/devices?action=history&axis=group&group=${targetAxis}&days=${targetDays}`;
                    }

                    const response = await this.apiRequest(url, {
                        method: 'GET',
                        signal: this.historyController.signal
                    });
                    
                    if (!response.ok) throw new Error("Échec du chargement de l'historique");
                    
                    const data = await response.json();
                    this.historyController = null;

                    if (targetAxis === this.historyAxis) {
                        this.renderHistoryChart(targetAxis, data);
                    }

                } catch (error) {
                    if (error.name === 'AbortError') return;
                    console.error("[ERROR] Erreur graphique :", error);
                }
            },


            isSecuredType(typeValue) {
                return typeValue && typeValue.startsWith('CA');
            },

            handleTypeChange(value) {
                // Réinitialise les champs dépendants du type
                const resetKeys = ['model_code', 'alt_code', 'base_cost', 'serial_number', 'region', 'maintenance_annual_rate', 'base_unit'];
                resetKeys.forEach(key => this.addForm[key] = '');
            },

            showApp() {
                this.currentScreen = 'app';
                this.loadInventoryData();
            },

            showLogin() {
                this.logoutSilently();
                this.currentScreen = 'login';
            },

            logoutSilently() {
                sessionStorage.removeItem('parc_username');
                sessionStorage.removeItem('parc_password');
                this.loginForm = { username: '', password: '' };
            },

            logout() { 
                this.logoutSilently(); 
                window.location.reload(); 
            },

            showError(msg) {
                this.errorMessage = msg;
                this.$nextTick(() => {
                    const errorDiv = document.getElementById('error-msg');
                    errorDiv?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                });
            },
            
            hideError() { 
                this.errorMessage = '';
            },

            toggleDetailsRow(uid) {
                this.expandedRows = this.expandedRows.includes(uid) ? [] : [uid];
            },
            
            toggleCreateBlock() {
                this.showCreateBlock = !this.showCreateBlock;
                if (this.showCreateBlock) {
                    this.addForm = getInitialAddForm();
                }
            },

            async loginWithCredentials() {
                document.activeElement.blur();
                
                const usernameInput = document.querySelector('input[name="username"]');
                const passwordInput = document.querySelector('input[name="password"]');
                
                if (usernameInput?.value) this.loginForm.username = usernameInput.value;
                if (passwordInput?.value) this.loginForm.password = passwordInput.value;

                if (!this.loginForm.username || !this.loginForm.password) return;
                this.hideError();
                this.currentScreen = 'loading';

                try {
                    sessionStorage.setItem('parc_username', this.loginForm.username);
                    sessionStorage.setItem('parc_password', this.loginForm.password);

                    const authorized = await this.loadDictionary();
                    if (authorized) { 
                        this.showApp(); 
                    } else { 
                        throw new Error("Identifiants incorrects."); 
                    }
                } catch (err) {
                    this.showLogin();
                    this.showError(err.message || "Échec de l'authentification.");
                }
            },

            prepareInventoryGroups(inventory) {
                this.inventoryGroups = Object.entries(inventory || {});
            },

            copyHardware(item) {
                this.addForm = getInitialAddForm();
                
                this.addForm.type = item.type || '';
                this.addForm.model_name = item.model_name || '';

                this.$nextTick(() => {
                    this.addForm.base_unit = item.base_unit || '';
                    this.addForm.model_code = item.model_code || '';
                    this.addForm.alt_code = item.alt_code || '';
                    this.addForm.serial_number = item.serial_number || '';
                    this.addForm.region = item.region || '';
                    this.addForm.maintenance_annual_rate = item.maintenance_annual_rate || '';

                    this.showCreateBlock = true;

                    setTimeout(() => {
                        const block = document.getElementById('create-hardware-block');
                        block?.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }, 80);
                });
            },

            openGlobalModal(type, item) {
                this.activeItem = item;
                this.modalType = type;
                this.activeMenuUid = null;
                
                if (type === 'edit') {
                    this.tempUnitCount = item.unit_count || 0;
                    this.tempBaseCost = item.base_cost || 0;
                } else if (type === 'rename') {
                    this.tempName = item.model_name || '';
                } else if (type === 'allocate_resource') {
					this.tempResourceDelta = 0;
				}
                this.showModal = true;
            },

            formatAmount(value) {
                const unit = "€";
                if (value === null || value === undefined || value === '') {
                    return `0 ${unit}`;
                }
                
                const num = Number(value);
                if (isNaN(num)) return 'N/A';

                if (Math.abs(num) >= 1000) {
                    return (num / 1000).toLocaleString(this.userLocale, { minimumFractionDigits: 0, maximumFractionDigits: 1 }) + 'K';
                }
                return num.toLocaleString(this.userLocale, { minimumFractionDigits: 0, maximumFractionDigits: 0 }) + ' ' + unit;
            },

            formatValue(value) {
                const num = Math.round(value ? Number(value) : 0);
                return `${num.toLocaleString(this.userLocale)} €`;
            },

            _formatPercentString(percentage, showParentheses, sign) {
                const percentageStr = Number(percentage).toLocaleString(this.userLocale, { 
                    minimumFractionDigits: 2, 
                    maximumFractionDigits: 2, 
                    signDisplay: sign ? 'exceptZero' : 'never'
                }) + '%';
                
                return showParentheses ? `(${percentageStr})` : percentageStr;
            },

            getPercent(percent, showParentheses = false, sign = false) {
                if (!percent || Number(percent) === 0) return '';
                return this._formatPercentString(percent, showParentheses, sign);
            },

            getPercentByValue(value, base, showParentheses = false, sign = false) {
                if (!base || Number(base) === 0 || !value || Number(value) === 0) return '';
                
                const percentage = (Number(value) / Number(base)) * 100;
                return this._formatPercentString(percentage, showParentheses, sign);
            },

            // --- GETTERS & PROPRIÉTÉS CALCULÉES ---

            get filteredGroups() {
                if (!this.inventoryGroups || this.inventoryGroups.length === 0) return [];
                
                const query = this.filterQuery ? this.filterQuery.toLowerCase().trim() : '';
                const matchFilter = (item) => {
                    if (!query) return true;
                    return (item.model_name || '').toLowerCase().includes(query) ||
                           (item.model_code || '').toLowerCase().includes(query) ||
                           (item.region || '').toLowerCase().includes(query);
                };

                const sortItems = (items) => [...items].sort((a, b) => {
                    const valA = a.value ? Number(a.value) : 0;
                    const valB = b.value ? Number(b.value) : 0;
                    return valB - valA;
                });

                if (this.displayMode === 'global') {
                    const globalGroup = this.inventoryData?.summary?.global;
                    if (!globalGroup) return [];

                    const rawItems = globalGroup.items || [];
                    const filteredItems = rawItems.filter(matchFilter);
                    const sortedItems = sortItems(filteredItems).map((item, index) => ({
                        ...item,
                        uid: item.uid || `x-conso-${index}`
                    }));

                    const value = query 
                        ? sortedItems.reduce((sum, item) => sum + (Number(item.value) || 0), 0) 
                        : (globalGroup.value || 0);

                    return [
                        ['global', {
                            base: globalGroup.base || 0,
                            value,
                            diff_value: globalGroup.diff_value || 0,
                            overhead: globalGroup.overhead || 0,
                            items: sortedItems
                        }]
                    ];
                }

                return this.inventoryGroups.map(([groupId, groupData]) => {
                    const filteredItems = groupData.items.filter(matchFilter);
                    const sortedItems = sortItems(filteredItems);
                    const value = query 
                        ? sortedItems.reduce((sum, item) => sum + (item.value ? Number(item.value) : 0), 0)
                        : groupData.value;
                    
                    return [groupId, { ...groupData, items: sortedItems, value }];
                })
                .filter(([_, groupData]) => groupData.items.length > 0)
                .sort((a, b) => b[1].value - a[1].value);
            },

            get filteredTotalAmount() {
                return this.filteredGroups.reduce((sum, [_, groupData]) => sum + groupData.value, 0);
            },

            get globalTotals() {
                return this.inventoryData?.summary?.global;
            },


            renderHistoryChart(axis, data) {
                const ctx = document.getElementById('hardwareHistoryChart');
                if (!ctx) return;

                const labels = data.map(point => point.date);
                const specialColors = { 'Value': '#2563eb', 'Base': '#64748b' };
                const standardColors = ['#0ea5e9', '#8b5cf6', '#f59e0b', '#10b981', '#ec4899'];

                const seriesKeys = Array.from(new Set(data.flatMap(point => point.data ? Object.keys(point.data) : [])));

                const datasets = seriesKeys.map((key, index) => {
                    const lineColor = (axis !== 'types' && axis !== 'regions')
                        ? (specialColors[key] || standardColors[index % standardColors.length])
                        : standardColors[index % standardColors.length];

                    return {
                        label: key,
                        data: data.map(point => point.data?.[key] || 0),
                        borderColor: lineColor,
                        borderWidth: 2,
                        fill: false,
                        tension: 0.15,
                        pointRadius: 0
                    };
                });

                if (this.chartInstance) {
                    this.chartInstance.destroy();
                }

                this.chartInstance = new Chart(ctx, {
                    type: 'line',
                    data: { labels, datasets },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: { mode: 'index', intersect: false },
                        plugins: {
                            legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 11 }, padding: 15 } },
                            tooltip: {
                                padding: 10,
                                bodyFont: { size: 12 },
                                callbacks: {
                                    label: (context) => ` ${context.dataset.label} : ${this.formatAmount(context.raw)}`
                                },
                                itemSort: (a, b) => b.raw - a.raw
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                grid: { color: '#f1f5f9' },
                                ticks: { font: { size: 10 }, callback: (value) => this.formatAmount(value) }
                            },
                            x: { grid: { display: false }, ticks: { font: { size: 10 }, maxRotation: 45, autoSkip: true } }
                        }
                    }
                });
            },
			
			async downloadCSV() {
				this.hideError();
				try {
					const response = await this.apiRequest(`/devices?action=export_csv&dialect=fr&mode=${this.displayMode}`);
					if (!response.ok) throw new Error("Échec du téléchargement.");
					
					const blob = await response.blob();
					const url = window.URL.createObjectURL(blob);
					const a = document.createElement('a');
					a.href = url;
					a.download = `inventory_${this.displayMode}.csv`;
					document.body.appendChild(a);
					a.click();
					a.remove();
				} catch (err) {
					this.showError(err.message);
				}
			}
        };
    }
</script>
</body>
